version: '3.9'

services:
  redis:
    image: redis:latest
    container_name: meu-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - '5540:5540'
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis-data:
